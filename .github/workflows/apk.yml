name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-dev \
            python3-pip \
            libncurses5-dev \
            unzip \
            wget \
            openjdk-17-jdk

      # 4. Install Python dependencies
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython
          pip install buildozer

      # 5. Download and setup Android SDK Command Line Tools
      - name: Download Android SDK Command Line Tools
        run: |
          mkdir -p $HOME/android-sdk-cmdline-tools
          cd $HOME/android-sdk-cmdline-tools
          
          # Download command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          
          # Move to correct location
          mkdir -p $HOME/android-sdk-cmdline-tools/latest
          mv cmdline-tools/bin $HOME/android-sdk-cmdline-tools/latest/
          mv cmdline-tools/lib $HOME/android-sdk-cmdline-tools/latest/
          mv cmdline-tools/NOTICE.txt $HOME/android-sdk-cmdline-tools/latest/
          mv cmdline-tools/source.properties $HOME/android-sdk-cmdline-tools/latest/
          
          echo "✅ SDK Command Line Tools downloaded"
          ls -la $HOME/android-sdk-cmdline-tools/latest/bin/

      # 6. Accept Android SDK Licenses
      - name: Accept Android SDK Licenses
        run: |
          export CMDLINE_TOOLS=$HOME/android-sdk-cmdline-tools/latest/bin
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$CMDLINE_TOOLS:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # Create licenses directory
          mkdir -p $ANDROID_HOME/licenses
          mkdir -p $HOME/.android/licenses
          
          # Accept licenses using sdkmanager
          yes | $CMDLINE_TOOLS/sdkmanager --licenses > /dev/null 2>&1 || true
          
          # Write license files manually
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\n601085b94cd77f0b54ff764069567015362fc1c" >> $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-preview-license
          
          echo "✅ Licenses accepted"
          ls $ANDROID_HOME/licenses/

      # 7. Install SDK Platform Tools and Build Tools
      - name: Install Android SDK components
        run: |
          export CMDLINE_TOOLS=$HOME/android-sdk-cmdline-tools/latest/bin
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          export PATH=$PATH:$CMDLINE_TOOLS:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # Install platform-tools
          echo "Installing platform-tools..."
          $CMDLINE_TOOLS/sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          
          echo "✅ SDK components installed"
          ls -la $ANDROID_HOME/
          ls -la $ANDROID_HOME/platform-tools/ 2>/dev/null || echo "platform-tools not found"
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null || echo "build-tools not found"

      # 8. Initialize buildozer if needed
      - name: Initialize buildozer
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

      # 9. Update buildozer.spec
      - name: Update buildozer.spec
        run: |
          # Update build tools version
          sed -i 's/android.build_tools_version = 37.0.0/android.build_tools_version = 34.0.0/g' buildozer.spec
          sed -i 's/android.build_tools_version = auto/android.build_tools_version = 34.0.0/g' buildozer.spec
          
          # Set accept license
          if ! grep -q "android.accept_license = 1" buildozer.spec; then
            echo "android.accept_license = 1" >> buildozer.spec
          fi
          
          # Set Android API
          if ! grep -q "android.api = " buildozer.spec; then
            echo "android.api = 34" >> buildozer.spec
          fi
          
          echo "✅ buildozer.spec updated"
          cat buildozer.spec

      # 10. Clean and build
      - name: Clean previous builds
        run: |
          rm -rf .buildozer
          rm -rf bin
          echo "✅ Cleaned"

      # 11. Build APK
      - name: Build Android APK
        run: |
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$PATH:$HOME/android-sdk-cmdline-tools/latest/bin:$ANDROID_HOME/cmdline-tools/latest/bin
          
          buildozer android debug
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk

      # 12. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
          retention-days: 30