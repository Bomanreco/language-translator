name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ANDROID_API: 34
  ANDROID_BUILD_TOOLS: 34.0.0
  ANDROID_NDK: 25.2.9519653

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            zip unzip openjdk-17-jdk \
            autoconf automake libtool \
            pkg-config zlib1g-dev \
            libncurses5-dev libncursesw5-dev \
            cmake git wget curl \
            build-essential ccache \
            libffi-dev libssl-dev

      - name: Install Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip

          unzip -q commandlinetools-linux-11076708_latest.zip

          mkdir -p $HOME/android-sdk/cmdline-tools/latest

          mv cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV

          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/build-tools/${ANDROID_BUILD_TOOLS}" >> $GITHUB_PATH

      - name: Install Android Packages
        run: |
          yes | sdkmanager --licenses

          sdkmanager \
            "platform-tools" \
            "platforms;android-${ANDROID_API}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK}"

      - name: Verify SDK Installation
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"

          find $ANDROID_HOME -name aidl

          find $ANDROID_HOME -name aapt

          find $ANDROID_HOME -name zipalign

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.36

      - name: Clean Previous Builds
        run: |
          rm -rf .buildozer
          rm -rf bin

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LanguageTranslator-APK
          path: bin/*.apk