name: Build Android APK

on:
push:
branches:
- main
- master
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04


env:
  ANDROID_API: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"
  ANDROID_NDK: "25.2.9519653"

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Setup Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Linux Dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y \
        openjdk-17-jdk \
        unzip \
        zip \
        git \
        wget \
        curl \
        python3-pip \
        python3-dev \
        build-essential \
        libffi-dev \
        libssl-dev \
        libncurses5-dev

  - name: Setup Android SDK
    uses: android-actions/setup-android@v3

  - name: Accept SDK Licenses
    run: |
      yes | sdkmanager --sdk_root=$ANDROID_SDK_ROOT --licenses

  - name: Install SDK Components
    run: |
      sdkmanager --sdk_root=$ANDROID_SDK_ROOT \
        "platform-tools" \
        "platforms;android-34" \
        "build-tools;34.0.0" \
        "ndk;25.2.9519653"

  - name: Verify SDK Installation
    run: |
      echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      ls -la $ANDROID_SDK_ROOT
      ls -la $ANDROID_SDK_ROOT/platform-tools
      ls -la $ANDROID_SDK_ROOT/build-tools/34.0.0

  - name: Verify AIDL
    run: |
      AIDL=$(find $ANDROID_SDK_ROOT -name aidl | head -1)

      echo "AIDL: $AIDL"

      if [ -z "$AIDL" ]; then
        echo "AIDL NOT FOUND"
        exit 1
      fi

      chmod +x "$AIDL"

  - name: Install Buildozer
    run: |
      python -m pip install --upgrade pip
      pip install buildozer
      pip install cython==0.29.36
      pip install python-for-android

  - name: Clean Previous Builds
    run: |
      rm -rf .buildozer
      rm -rf ~/.buildozer
      rm -rf bin
      rm -rf build

  - name: Update buildozer.spec
    run: |
      sed -i '/android.api/d' buildozer.spec
      echo "android.api = 34" >> buildozer.spec

      sed -i '/android.accept_sdk_license/d' buildozer.spec
      echo "android.accept_sdk_license = True" >> buildozer.spec

  - name: Build APK
    env:
      ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
      ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
    run: |
      buildozer android clean
      buildozer -v android debug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: android-apk
      path: bin/*.apk

