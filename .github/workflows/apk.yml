name: Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-dev python3-pip libncurses5-dev 
          sudo apt-get install -y unzip openjdk-17-jdk

      # 4. Install Python dependencies
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install cython
          pip install buildozer

      # 5. Accept Android SDK Licenses (CRITICAL FIX)
      - name: Accept Android SDK Licenses
        run: |
          mkdir -p $ANDROID_HOME/licenses
          mkdir -p $HOME/.android/licenses
          
          # Write license files to buildozer SDK location
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\n601085b94cd77f0b54ff764069567015362fc1c" >> $ANDROID_HOME/licenses/android-sdk-license
          
          # Also write to default Android SDK location
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.android/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" >> $HOME/.android/licenses/android-sdk-license
          echo -e "\nd56f5187479451eabf01fb78af6dfcb131a6481e" >> $HOME/.android/licenses/android-sdk-license
          echo -e "\nd975f751698a77b662f1254ddbeed3901e976f5a" >> $HOME/.android/licenses/android-sdk-license
          echo -e "\n601085b94cd77f0b54ff764069567015362fc1c" >> $HOME/.android/licenses/android-sdk-license
          
          # Android SDK Platform license
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-preview-license
          echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55" > $HOME/.android/licenses/android-sdk-preview-license
          
          echo "✅ Licenses accepted successfully"
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk

      # 6. Initialize buildozer (if no spec file exists)
      - name: Initialize buildozer
        run: |
          if [ ! -f buildozer.spec ]; then
            echo "No buildozer.spec found, creating one..."
            buildozer init
          else
            echo "buildozer.spec already exists"
          fi

      # 7. Update buildozer.spec with stable build tools
      - name: Update buildozer.spec
        run: |
          # Update build tools version to stable 34.0.0
          sed -i 's/android.build_tools_version = 37.0.0/android.build_tools_version = 34.0.0/g' buildozer.spec
          sed -i 's/android.build_tools_version = auto/android.build_tools_version = 34.0.0/g' buildozer.spec
          
          # Ensure license acceptance is enabled
          if ! grep -q "android.accept_license = 1" buildozer.spec; then
            echo "android.accept_license = 1" >> buildozer.spec
          fi
          
          echo "✅ buildozer.spec updated"
          cat buildozer.spec

      # 8. Clean previous builds
      - name: Clean previous builds
        run: |
          rm -rf .buildozer
          rm -rf bin
          rm -rf build
          echo "✅ Cleaned previous builds"

      # 9. Build Android APK
      - name: Build Android APK
        run: |
          buildozer android debug
        env:
          ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
          ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk

      # 10. Upload APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
          retention-days: 30