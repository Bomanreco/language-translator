name: Build Android APK

on:
push:
branches:
- main
- master
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-22.04


env:
  ANDROID_API: 33
  ANDROID_BUILD_TOOLS: 33.0.2
  ANDROID_NDK: 25.2.9519653
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

steps:
  - name: Checkout Repository
    uses: actions/checkout@v4

  - name: Set Up Python
    uses: actions/setup-python@v5
    with:
      python-version: "3.11"

  - name: Install Linux Dependencies
    run: |
      sudo apt-get update

      sudo apt-get install -y \
        zip unzip tar wget curl git \
        build-essential autoconf automake libtool \
        pkg-config cmake \
        openjdk-17-jdk \
        python3-pip \
        libffi-dev \
        libssl-dev \
        zlib1g-dev \
        libncurses5-dev \
        libncursesw5-dev \
        libtinfo5 \
        libsqlite3-dev \
        libbz2-dev

  - name: Verify Java
    run: |
      java -version
      javac -version

  - name: Clean Previous Buildozer Cache
    run: |
      rm -rf ~/.buildozer
      rm -rf .buildozer

  - name: Setup Android SDK
    uses: android-actions/setup-android@v3

  - name: Accept Android Licenses
    run: |
      yes | sdkmanager --licenses

  - name: Install Android Components
    run: |
      sdkmanager --install \
        "platform-tools" \
        "platforms;android-33" \
        "build-tools;33.0.2" \
        "cmdline-tools;latest" \
        "ndk;25.2.9519653"

  - name: Verify SDK Installation
    run: |
      echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

      sdkmanager --list | head -50

      ls -la $ANDROID_SDK_ROOT/build-tools
      ls -la $ANDROID_SDK_ROOT/platforms

  - name: Verify AIDL Exists
    run: |
      AIDL=$(find $ANDROID_SDK_ROOT/build-tools -name aidl | head -1)

      echo "AIDL FOUND:"
      echo "$AIDL"

      if [ -z "$AIDL" ]; then
        echo "ERROR: AIDL not found!"
        exit 1
      fi

      sudo ln -sf "$AIDL" /usr/local/bin/aidl

      which aidl

  - name: Install Python Dependencies
    run: |
      python -m pip install --upgrade pip wheel setuptools

      pip install \
        buildozer \
        cython==0.29.36 \
        virtualenv \
        python-for-android

  - name: Display Buildozer Version
    run: |
      buildozer --version

  - name: Build APK
    run: |
      buildozer android clean

      buildozer \
        -v \
        android debug

  - name: Upload APK
    uses: actions/upload-artifact@v4
    with:
      name: android-apk
      path: |
        bin/*.apk
        bin/*.aab
      if-no-files-found: error
```
