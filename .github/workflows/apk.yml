name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential \
            git \
            zip \
            unzip \
            wget \
            curl \
            autoconf \
            automake \
            libtool \
            pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libtinfo5 \
            cmake \
            libffi-dev \
            libssl-dev

      - name: Install Python Build Tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer==1.5.0
          pip install python-for-android

      - name: Cache Buildozer Global Directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT="/usr/local/lib/android/sdk"
          sudo chown -R $USER:$USER $ANDROID_SDK_ROOT
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          mkdir -p $ANDROID_SDK_ROOT/licenses
          printf "8933bad161af4178b1185d1a37fbf41ea5269c55\n24333f8a63b6825ea5157d1a12731729b15b5e37\n" \
            > $ANDROID_SDK_ROOT/licenses/android-sdk-license
          printf "84831b9409646a918e30573bab4c9c91346d8abd\n" \
            > $ANDROID_SDK_ROOT/licenses/android-sdk-preview-license

          yes | $SDKMANAGER --licenses 2>/dev/null || true

          $SDKMANAGER \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653"

          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Patch buildozer.spec for CI
        run: |
          sed -i "s|^#\?android\.api\s*=.*|android.api = 34|"               buildozer.spec
          sed -i "s|^#\?android\.minapi\s*=.*|android.minapi = 21|"         buildozer.spec
          sed -i "s|^#\?android\.ndk\s*=.*|android.ndk = 25.2.9519653|"     buildozer.spec
          sed -i "s|^#\?android\.accept_sdk_license\s*=.*|android.accept_sdk_license = True|" buildozer.spec
          sed -i "s|^#\?android\.sdk_path\s*=.*|android.sdk_path = $ANDROID_HOME|"   buildozer.spec
          sed -i "s|^#\?android\.ndk_path\s*=.*|android.ndk_path = $ANDROID_NDK_HOME|" buildozer.spec

          # Ensure archs line exists and is correct
          grep -q "^android\.archs" buildozer.spec \
            && sed -i "s|^android\.archs\s*=.*|android.archs = arm64-v8a, armeabi-v7a|" buildozer.spec \
            || echo "android.archs = arm64-v8a, armeabi-v7a" >> buildozer.spec

          echo "=== Patched spec (android lines) ==="
          grep -E "^android\." buildozer.spec

      - name: Build APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
        run: |
          echo "ANDROID_HOME : $ANDROID_HOME"
          echo "ANDROID_NDK  : $ANDROID_NDK_HOME"
          buildozer -v android debug 2>&1 | tee build.log
          echo "Exit code: ${PIPESTATUS[0]}"
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "--- Last 100 lines of build.log ---"
            tail -100 build.log
            exit 1
          fi

      - name: Locate APK
        if: always()
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: Language-Translator-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
