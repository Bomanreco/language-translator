name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROIDAPI: "34"
      ANDROIDMINAPI: "21"
      ANDROIDNDK: "25b"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Linux packages
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip wget curl
          sudo apt-get install -y autoconf automake libtool pkg-config
          sudo apt-get install -y zlib1g-dev libncurses5-dev
          sudo apt-get install -y libncursesw5-dev cmake
          sudo apt-get install -y libffi-dev libssl-dev

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer
          pip install python-for-android

      - name: Create Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip
          mkdir -p $HOME/android-sdk/cmdline-tools/latest
          mv cmdline-tools/* $HOME/android-sdk/cmdline-tools/latest/
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: Install Android SDK Components
        run: |
          timeout 300 yes | sdkmanager --sdk_root=$HOME/android-sdk --licenses
          sdkmanager --sdk_root=$HOME/android-sdk \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25.2.9519653"
          sdkmanager --list --sdk_root=$HOME/android-sdk

      - name: Verify AIDL
        run: |
          find $HOME/android-sdk -name aidl

      - name: Create buildozer.spec
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

      - name: Configure buildozer.spec
        run: |
          sed -i 's/p4a.bootstrap = sdl2/p4a.bootstrap = sdl2/g' buildozer.spec
          sed -i 's/android.api = .*/android.api = 34/g' buildozer.spec
          sed -i 's/android.minapi = .*/android.minapi = 21/g' buildozer.spec
          sed -i 's/android.ndk = .*/android.ndk = 25.2.9519653/g' buildozer.spec
          sed -i 's|android.sdk = .*|android.sdk = '$HOME'/android-sdk|g' buildozer.spec
          sed -i 's|android.ndk_path = .*|android.ndk_path = '$HOME'/android-sdk/ndk/25.2.9519653|g' buildozer.spec

      - name: Clean Build
        run: |
          rm -rf .buildozer
          rm -rf bin

      - name: Build APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          P4A_DEBUG: 1
        run: |
          buildozer -v android debug 2>&1 | head -200

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: bin/*.apk
