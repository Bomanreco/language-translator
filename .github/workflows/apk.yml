name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-22.04

    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_NDK_VERSION: 25.2.9519653
      ANDROID_API: 34
      ANDROID_BUILD_TOOLS: 34.0.0

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Toolchains ────────────────────────────────────────────────────────
      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. System packages ───────────────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git zip unzip wget curl \
            autoconf automake libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            libltdl-dev

      # ── 4. Python build tools ────────────────────────────────────────────────
      - name: Install Python build tools
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36
          pip install buildozer==1.5.0
          pip install python-for-android

      # ── 5. Cache ─────────────────────────────────────────────────────────────
      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      # ── 6. Android SDK / NDK ─────────────────────────────────────────────────
      - name: Setup Android SDK and NDK
        run: |
          sudo chown -R "$USER:$USER" "$ANDROID_SDK_ROOT"
          SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"

          # Accept licences
          mkdir -p "$ANDROID_SDK_ROOT/licenses"
          printf '%s\n' \
            "8933bad161af4178b1185d1a37fbf41ea5269c55" \
            "24333f8a63b6825ea5157d1a12731729b15b5e37" \
            > "$ANDROID_SDK_ROOT/licenses/android-sdk-license"
          printf '%s\n' "84831b9409646a918e30573bab4c9c91346d8abd" \
            > "$ANDROID_SDK_ROOT/licenses/android-sdk-preview-license"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true

          # Install SDK components
          "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-${ANDROID_API}" \
            "build-tools;${ANDROID_BUILD_TOOLS}" \
            "ndk;${ANDROID_NDK_VERSION}"

          echo "ANDROID_HOME=$ANDROID_SDK_ROOT"                            >> "$GITHUB_ENV"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"

      # ── 7. Patch spec for CI ─────────────────────────────────────────────────
      - name: Patch buildozer.spec
        run: |
          NDK_PATH="$ANDROID_SDK_ROOT/ndk/$ANDROID_NDK_VERSION"

          # Uncomment / set required Android keys
          python3 - <<'PY'
          import re, os

          spec = open("buildozer.spec").read()

          def set_key(text, key, value):
              # Replace commented or existing line
              pattern = rf'^#?\s*{re.escape(key)}\s*=.*'
              replacement = f'{key} = {value}'
              new, n = re.subn(pattern, replacement, text, flags=re.MULTILINE)
              if n == 0:
                  new = text + f'\n{replacement}\n'
              return new

          ndk_path = os.environ["ANDROID_SDK_ROOT"] + "/ndk/" + os.environ["ANDROID_NDK_VERSION"]
          sdk_path = os.environ["ANDROID_SDK_ROOT"]

          spec = set_key(spec, "android.api",                "34")
          spec = set_key(spec, "android.minapi",             "21")
          spec = set_key(spec, "android.ndk",                os.environ["ANDROID_NDK_VERSION"])
          spec = set_key(spec, "android.ndk_path",           ndk_path)
          spec = set_key(spec, "android.sdk_path",           sdk_path)
          spec = set_key(spec, "android.accept_sdk_license", "True")
          spec = set_key(spec, "android.archs",              "arm64-v8a, armeabi-v7a")

          open("buildozer.spec", "w").write(spec)
          print("Spec patched OK")
          PY

          echo "=== Android keys after patch ==="
          grep -E "^android\." buildozer.spec

      # ── 8. Build ─────────────────────────────────────────────────────────────
      - name: Build APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
        run: |
          echo "=== Environment ==="
          echo "ANDROID_HOME     : $ANDROID_HOME"
          echo "ANDROID_NDK_HOME : $ANDROID_NDK_HOME"
          echo "Java             : $(java -version 2>&1 | head -1)"
          echo "Python           : $(python --version)"
          echo "Buildozer        : $(buildozer --version 2>&1)"
          echo "==================="

          buildozer android debug 2>&1 | tee buildozer_build.log
          STATUS=${PIPESTATUS[0]}

          if [ "$STATUS" -ne 0 ]; then
            echo ""
            echo "╔══════════════════════════════════════╗"
            echo "║  BUILD FAILED  (exit $STATUS)         ║"
            echo "╚══════════════════════════════════════╝"
            echo "--- Last 200 lines of build log ---"
            tail -200 buildozer_build.log
            exit "$STATUS"
          fi

      # ── 9. Verify & upload ───────────────────────────────────────────────────
      - name: Find APK
        if: always()
        run: |
          echo "=== APK files found ==="
          find . -name "*.apk" 2>/dev/null | grep -v '.buildozer' || echo "None"
          echo "=== bin/ contents ==="
          ls -lh bin/ 2>/dev/null || echo "bin/ does not exist"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: LanguageTranslator-debug-APK
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
