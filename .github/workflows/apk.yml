name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y openjdk-17-jdk wget unzip

      - name: Download Android SDK
        run: |
          cd /tmp
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mkdir -p $HOME/android-sdk/tools/bin
          mv cmdline-tools/* $HOME/android-sdk/tools/
          rm commandlinetools-linux-11076708_latest.zip

      - name: Install SDK components
        run: |
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          yes | $HOME/android-sdk/tools/bin/sdkmanager --licenses 2>/dev/null || true
          $HOME/android-sdk/tools/bin/sdkmanager "platform-tools;34.0.0" "build-tools;34.0.0" "platforms;android-34"

      - name: Link SDK for Buildozer
        run: |
          mkdir -p ~/.buildozer/android/platform
          ln -sf $HOME/android-sdk ~/.buildozer/android/platform/android-sdk

      - name: Install Buildozer
        run: |
          pip install --upgrade pip
          pip install cython buildozer

      - name: Build APK
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: translator-apk
          path: bin/*.apk